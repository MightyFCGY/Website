<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mighty Men FC - Football for Everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <header>
        <div class="container">
            <img src="logo.jpg" alt="Mighty Men FC Logo" class="logo">
            <h1>Mighty Men FC</h1>
            <p class="tagline">Football for Everyone</p>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="info-card">
                <h2>⚽ Every Tuesday</h2>
                <p class="time">7:00 PM - 8:00 PM</p>
                <p class="price">Subs: <strong>£3</strong></p>
                <p class="location">📍 Clee Fields, Grimsby</p>
            </section>

            <section class="cta">
                <h3>Want to Join?</h3>
                <p>Turn up and play! All skill levels welcome.</p>
                <a href="mailto:mightyfcgy@gmail.com" class="btn">Get in Touch</a>
            </section>

            <section class="contact">
                <h3>Contact Us</h3>
                <form action="mailto:mightyfcgy@gmail.com" method="post" enctype="text/plain">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" placeholder="Message" rows="5" required></textarea>
                    <button type="submit" class="btn">Send Message</button>
                </form>
                <p class="email-direct">Or email us directly: <a href="mailto:mightyfcgy@gmail.com">mightyfcgy@gmail.com</a></p>
            </section>
        </div>
    </main>

    <footer>
        <p>© Mighty Men FC. Football for everyone.</p>
    </footer>
</body>
</html>
