<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mighty FC | Grimsby Football</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            line-height: 1.5;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: #1a1a1a;
            padding: 40px 30px;
            text-align: center;
        }

        header img {
            height: 80px;
            display: block;
            margin: 0 auto 20px;
        }

        header h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        /* Main */
        main {
            padding: 40px 30px;
        }

        h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Details */
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .detail-item {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 8px;
        }

        .detail-item h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 8px;
        }

        .detail-item p {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0;
        }

        /* Price */
        .price-box {
            background: #1a1a1a;
            color: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 40px;
        }

        .price-box h2 {
            color: #888;
            margin-bottom: 15px;
        }

        .price-box .price {
            font-size: 3rem;
            font-weight: 800;
        }

        .price-box .note {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Form */
        .form-box {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 40px;
        }

        .form-box h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #333;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            margin-top: 15px;
        }

        /* Contact */
        .contact {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .contact h2 {
            margin-bottom: 15px;
        }

        .contact-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .contact-links a {
            background: #f0f0f0;
            color: #1a1a1a;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .contact-links a:hover {
            background: #e0e0e0;
        }

        /* Footer */
        footer {
            background: #f9f9f9;
            padding: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }

        @media (max-width: 500px) {
            .details {
                grid-template-columns: 1fr;
            }
            header, main, footer {
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="logo-new.png" alt="Mighty FC">
            <h1>MIGHTY FC</h1>
        </header>

        <main>
            <p>Weekly football in Grimsby. Turn up and play — all abilities welcome.</p>

            <div class="details">
                <div class="detail-item">
                    <h3>Location</h3>
                    <p>Clee Fields<br>Grimsby</p>
                </div>
                <div class="detail-item">
                    <h3>When</h3>
                    <p>Wednesday<br>8pm - 9pm</p>
                </div>
            </div>

            <div class="price-box">
                <h2>Session Fee</h2>
                <div class="price">£3</div>
                <div class="note">per session</div>
            </div>

            <div class="form-box">
                <h2>Sign Up</h2>
                <form id="signupForm">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone (optional)</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <button type="submit">Send</button>
                </form>
            </div>

            <div class="contact">
                <h2>Questions?</h2>
                <div class="contact-links">
                    <a href="https://facebook.com/groups/mightyfc">Facebook</a>
                    <a href="mailto:mightyfcgy@gmail.com">Email</a>
                </div>
            </div>
        </main>

        <footer>
            <p>Mighty FC — For the love of the game</p>
        </footer>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            
            const subject = encodeURIComponent(`New Player: ${name}`);
            const body = encodeURIComponent(
                `New player sign up:\n\n` +
                `Name: ${name}\n` +
                `Email: ${email}\n` +
                `Phone: ${phone || 'Not provided'}\n`
            );
            
            window.location.href = `mailto:mightyfcgy@gmail.com?subject=${subject}&body=${body}`;
            
            alert('Your email app should open. Send the email to complete your sign up!');
            this.reset();
        });
    </script>
</body>
</html>
