<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mighty Men FC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <style>
        .form-container {
            max-width: 500px;
            margin: 30px auto;
            background: #fff;
            border: 2px solid #000;
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #000;
            font-family: inherit;
            font-size: 1rem;
            background: #fff;
            color: #000;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background: #f5f5f5;
        }
        
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox-group input {
            width: auto;
            margin-top: 3px;
        }
        
        .checkbox-group label {
            font-size: 0.9rem;
            text-transform: none;
            letter-spacing: 0;
        }
        
        .submit-btn {
            width: 100%;
            background: #000;
            color: #fff;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .submit-btn:hover {
            background: #333;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #000;
            text-decoration: underline;
        }
        
        .whatsapp-note {
            background: #000;
            color: #fff;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .form-container {
                margin: 20px 15px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg" alt="Mighty Men FC Logo" class="logo">
        <h1>Mighty Men FC</h1>
    </header>

    <main>
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;">Join Us</h2>
            
            <div class="whatsapp-note">
                Once you sign up, you'll be added to our WhatsApp group 💬
            </div>
            
            <form action="mailto:mightyfcgy@gmail.com" method="post" enctype="text/plain">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required>
                </div>
                
                <div class="form-group">
                    <label>Message (optional)</label>
                    <textarea name="message" rows="3"></textarea>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and understand payment/refund policies</label>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="whatsapp" required>
                    <label for="whatsapp">I understand I'll be added to the Mighty Men FC WhatsApp group</label>
                </div>
                
                <button type="submit" class="submit-btn">Send</button>
            </form>
            
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </main>

    <footer>
        <p>© Mighty Men FC. Football for everyone.</p>
    </footer>
</body>
</html>
